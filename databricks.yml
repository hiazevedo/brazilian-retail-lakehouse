bundle:
  name: brazilian-retail-lakehouse

workspace:
  host: https://dbc-4755d9a9-d11b.cloud.databricks.com
  root_path: ~/.bundle/${bundle.name}/${bundle.target}

targets:

  dev:
    mode: development
    default: true

  prod:
    mode: production
    workspace:
      root_path: /Shared/brazilian-retail-lakehouse

# ---------------------------------------------------------------------------
resources:
  jobs:

    # -------------------------------------------------------------------------
    # Job de setup: executar manualmente uma única vez antes dos pipelines
    # -------------------------------------------------------------------------
    setup:
      name: "[retail] 00 - Setup Infraestrutura"
      tasks:
        - task_key: setup
          description: "Cria catalog, schemas, volumes e configura pipeline_config"
          notebook_task:
            notebook_path: ${workspace.file_path}/src/notebooks/00_setup
            source: WORKSPACE

    gold_basic:
      name: "[retail] 03 - Gold Basic"
      tasks:
        - task_key: gold_basic
          description: "Agrega dados Silver nas 4 tabelas Gold analíticas"
          notebook_task:
            notebook_path: ${workspace.file_path}/src/notebooks/gold/03_gold_basic
            source: WORKSPACE

    contract_registry:
      name: "[retail] 04 - Contract Registry"
      tasks:
        - task_key: contract_registry
          description: "Lê os YAMLs de contratos e popula contracts.registry"
          notebook_task:
            notebook_path: ${workspace.file_path}/src/notebooks/contracts/04_contract_registry
            source: WORKSPACE

    contract_validator:
      name: "[retail] 05 - Contract Validator"
      tasks:
        - task_key: contract_validator
          description: "Valida dados Silver contra os contratos ativos e registra violações"
          notebook_task:
            notebook_path: ${workspace.file_path}/src/notebooks/contracts/05_contract_validator
            source: WORKSPACE

    contract_monitor:
      name: "[retail] 06 - Contract Monitor"
      tasks:
        - task_key: contract_monitor
          description: "Dashboard analítico de conformidade de data contracts"
          notebook_task:
            notebook_path: ${workspace.file_path}/src/notebooks/contracts/06_contract_monitor
            source: WORKSPACE
