name: retail_lakehouse
version: "1.0.0"
profile: retail_lakehouse

model-paths: ["models"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  retail_lakehouse:

    staging:
      +materialized: view       # stagings são views — leves, sem custo de armazenamento
      +schema: staging

    intermediate:
      +materialized: view       # intermediates também são views
      +schema: intermediate

    marts:
      +materialized: table      # marts são tabelas físicas — consultadas com frequência
      +schema: gold
