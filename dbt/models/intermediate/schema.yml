version: 2

models:
  - name: int_vendas_enriquecidas
    description: "Vendas enriquecidas com dados de pagamento — base para fct_vendas e marts analíticos"
    columns:
      - name: venda_id
        description: "Identificador da venda — não único pois uma venda pode ter múltiplos pagamentos"
        tests:
          - not_null
      - name: loja_id
        tests:
          - not_null
      - name: produto_id
        tests:
          - not_null
      - name: valor_total
        tests:
          - not_null

  - name: int_estoque_posicao
    description: "Posição mais recente de estoque por loja e produto"
    columns:
      - name: loja_id
        tests:
          - not_null
      - name: produto_id
        tests:
          - not_null
      - name: estoque_atual
        tests:
          - not_null
